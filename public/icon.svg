<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <rect width="32" height="32" rx="6" fill="#10151A"/>
  <g transform="translate(6, 4)">
    <!-- Balance Scale -->
    <line x1="10" y1="20" x2="10" y2="2" stroke="#F5D47A" stroke-width="1.5"/>
    <line x1="10" y1="8" x2="20" y2="8" stroke="#F5D47A" stroke-width="1.5"/>
    
    <!-- Left Pan -->
    <rect x="4" y="6" width="12" height="4" rx="0.5" fill="#F5D47A"/>
    <line x1="5" y1="10" x2="5" y2="12" stroke="#F5D47A" stroke-width="1"/>
    <line x1="15" y1="10" x2="15" y2="12" stroke="#F5D47A" stroke-width="1"/>
    
    <!-- Right Pan -->
    <rect x="14" y="6" width="12" height="4" rx="0.5" fill="#F5D47A"/>
    <line x1="15" y1="10" x2="15" y2="12" stroke="#F5D47A" stroke-width="1"/>
    <line x1="25" y1="10" x2="25" y2="12" stroke="#F5D47A" stroke-width="1"/>
    
    <!-- Base -->
    <rect x="8" y="20" width="4" height="4" fill="#F5D47A"/>
    <rect x="6" y="24" width="8" height="2" fill="#F5D47A"/>
  </g>
</svg>
